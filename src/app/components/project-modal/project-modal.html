<div
  class="modal-backdrop"
  [class.visible]="visible"
  (click)="onBackdropClick($event)"
  role="dialog"
  aria-modal="true"
  [attr.aria-label]="project.title"
>
  <div class="modal" [class.visible]="visible">

    <!-- Accent bar -->
    <div class="modal__bar" [style.background]="project.accentColor"></div>

    <!-- Close button -->
    <button class="modal__close" (click)="dismiss()" aria-label="Close">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M2 2l14 14M16 2L2 16"/>
      </svg>
    </button>

    <div class="modal__body">

      <!-- Left column: info -->
      <div class="modal__info">
        <div class="modal__icon" [style.background]="'transparent'">
          <img *ngIf="project.imageUrl" [src]="project.imageUrl" [alt]="project.title" class="modal__photo" />
        </div>

        <h2 class="modal__title">{{ project.title }}</h2>
        <p class="modal__subtitle">{{ project.subtitle }}</p>

        <div class="modal__tags">
          <span class="tag" *ngFor="let tag of project.tags">{{ tag }}</span>
        </div>

        <div class="modal__divider"></div>

        <p class="modal__summary">{{ project.summary }}</p>

        <ul class="modal__bullets" *ngIf="project.bullets.length">
          <li *ngFor="let b of project.bullets">{{ b }}</li>
        </ul>

        <div class="modal__actions">
          <button
            *ngIf="project.githubUrl"
            class="modal__btn modal__btn--outline"
            (click)="openLink(project.githubUrl!)"
          >
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
            </svg>
            View on GitHub
          </button>
          <button
            *ngIf="project.demoUrl"
            class="modal__btn modal__btn--filled"
            (click)="openLink(project.demoUrl!)"
          >
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
              <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
            Try Demo
          </button>
        </div>
      </div>

      <!-- Right column: video -->
      <div class="modal__media" [class.modal__media--credited]="project.videoCredit">
        <!-- Local MP4 video -->
        <div class="modal__video-wrap" *ngIf="project.localVideoUrl">
          <video autoplay loop muted playsinline controls [src]="project.localVideoUrl"></video>
        </div>

        <!-- YouTube embed -->
        <div class="modal__video-wrap" *ngIf="safeVideoUrl && !project.localVideoUrl">
          <iframe
            [src]="safeVideoUrl"
            title="Project demo"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
          ></iframe>
        </div>

        <!-- Placeholder when no video -->
        <div class="modal__video-placeholder" *ngIf="!project.localVideoUrl && !safeVideoUrl">
          <div class="modal__video-placeholder__icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
          </div>
          <p>{{ project.videoCaption || 'Demo video coming soon' }}</p>
        </div>
        <p class="modal__video-credit" *ngIf="project.videoCredit">{{ project.videoCredit }}</p>
      </div>

    </div>
  </div>
</div>
