<div
  class="modal-backdrop"
  [class.visible]="visible"
  (click)="onBackdropClick($event)"
  role="dialog"
  aria-modal="true"
  [attr.aria-label]="experience.company"
>
  <div class="modal" [class.visible]="visible">

    <!-- Close button -->
    <button class="modal__close" (click)="dismiss()" aria-label="Close">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M2 2l14 14M16 2L2 16"/>
      </svg>
    </button>

    <div class="modal__body">

      <!-- Header -->
      <div class="modal__header">
        <div class="modal__logo">
          <img [src]="experience.logoUrl" [alt]="experience.company" />
        </div>
        <div class="modal__header-info">
          <h2 class="modal__company">{{ experience.company }}</h2>
          <p class="modal__role">{{ experience.role }}</p>
          <div class="modal__meta">
            <span class="modal__period">{{ experience.period }}</span>
            <span class="modal__sep">·</span>
            <span class="modal__location">{{ experience.location }}</span>
          </div>
        </div>
      </div>

      <!-- Tags -->
      <div class="modal__tags">
        <span class="tag" *ngFor="let tag of experience.tags">{{ tag }}</span>
      </div>

      <div class="modal__divider"></div>

      <!-- Summary -->
      <p class="modal__summary" *ngIf="experience.summary">{{ experience.summary }}</p>

      <!-- Bullets -->
      <ul class="modal__bullets" *ngIf="experience.bullets.length">
        <li *ngFor="let b of experience.bullets">{{ b }}</li>
      </ul>

    </div>
  </div>
</div>
